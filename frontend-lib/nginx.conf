server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # config.js is generated at container start — no caching
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Compiled library assets — long cache, content-addressed
    location /dist/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
